name: Update CTFtime Stats

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:  # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch CTFtime data
        run: |
          curl -s "https://ctftime.org/api/v1/teams/440041/" > ctftime.json
          cat ctftime.json
      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ctftime.json
          git diff --staged --quiet || git commit -m "auto: update CTFtime stats"
          git push
